name: Deploy to Firebase Hosting

# Builds the app and deploys it to Firebase Hosting from GitHub's runners, so
# deploys never depend on the local machine's network (which sits behind a
# TLS-inspecting agent that breaks the Firebase CLI). Runs on every push to
# main, and can also be triggered manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      # Deploy with the Firebase CLI rather than action-hosting-deploy@v0. The
      # action's channel-release step fails with FAILED_PRECONDITION when the
      # built version already matches the live version (e.g. after a manual
      # `firebase deploy`), reporting a false CI failure. `firebase deploy`
      # re-releases idempotently and never errors on unchanged content.
      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          npx -y firebase-tools@latest deploy --only hosting --project tiktokwork-e2972 --non-interactive
          rm -f "$RUNNER_TEMP/firebase-sa.json"
