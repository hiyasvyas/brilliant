name: Deploy to Firebase Hosting

# Builds the app and deploys it to Firebase Hosting from GitHub's runners, so
# deploys never depend on the local machine's network (which sits behind a
# TLS-inspecting agent that breaks the Firebase CLI). Runs on every push to
# main, and can also be triggered manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      # Deploy with the Firebase CLI. Firebase Hosting rejects a release whose
      # content is byte-identical to the live version with a 400
      # FAILED_PRECONDITION ("is the current active version"). That happens
      # whenever the same build was already deployed (e.g. a manual
      # `firebase deploy` before the push), and it isn't a real failure — the
      # desired end state (live serves this exact build) is already met. So we
      # treat that specific error as success and only fail on genuine errors.
      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          set +e
          out=$(npx -y firebase-tools@latest deploy --only hosting --project tiktokwork-e2972 --non-interactive 2>&1)
          code=$?
          echo "$out"
          rm -f "$RUNNER_TEMP/firebase-sa.json"
          if [ $code -ne 0 ] && echo "$out" | grep -q "is the current active version"; then
            echo "Live already serves this exact build — nothing to release. Treating as success."
            exit 0
          fi
          exit $code
